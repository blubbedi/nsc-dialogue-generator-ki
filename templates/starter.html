<div style="padding: 10px;">
    <div class="form-group">
        <label>Spieler Charakter:</label>
        <select id="p-select" style="width: 100%; margin-bottom: 10px;">
            <option value="">-- Wähle Charakter --</option>
            {{#each players}}
                <option value="{{this.id}}">{{this.name}}</option>
            {{/each}}
        </select>
    </div>
    <div class="form-group">
        <label>NSC (aus Ordner 'Dialog-Nsc'):</label>
        <select id="n-select" style="width: 100%; margin-bottom: 10px;">
            <option value="">-- Wähle NSC --</option>
            {{#each npcs}}
                <option value="{{this.id}}">{{this.name}}</option>
            {{/each}}
        </select>
    </div>
    <button id="start-btn" style="width: 100%;"><i class="fas fa-comments"></i> Dialog Starten</button>
</div>
