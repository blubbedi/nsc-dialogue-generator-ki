<div class="gemini-chat" style="display:flex; flex-direction:column; height:100%;">
    <div id="gemini-history" style="flex:1; overflow-y:auto; padding:10px; margin-bottom:10px; border-radius: 5px;">
        {{#each history}}
            <div class="msg-wrapper {{role}}">
                {{#if (eq role "user")}}
                    <div class="msg-content user">
                        <strong>{{../playerName}}</strong>
                        <p>{{parts.[0].text}}</p>
                    </div>
                    <img src="{{../playerImg}}" class="chat-avatar" title="{{../playerName}}">
                {{else}}
                    <img src="{{../npcImg}}" class="chat-avatar" title="{{../npcName}}">
                    <div class="msg-content model">
                        <strong>{{../npcName}}</strong>
                        <p>{{parts.[0].text}}</p>
                    </div>
                {{/if}}
            </div>
        {{/each}}
        {{#if isThinking}}
            <div class="msg-wrapper model thinking-wrapper">
                <img src="{{npcImg}}" class="chat-avatar" title="{{npcName}}">
                <div class="thinking msg-content model">... denkt nach ...</div>
            </div>
        {{/if}}
    </div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="chat-input" placeholder="Sprecht..." style="flex:1">
        <button id="send-btn" style="width:40px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
