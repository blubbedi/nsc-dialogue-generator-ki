<div class="gemini-chat" style="display:flex; flex-direction:column; height:100%;">
    <div id="gemini-history">
        {{#each history}}
            <div class="msg-wrapper {{role}}">
                <img src="{{#if (eq role 'user')}}{{../playerImg}}{{else}}{{../npcImg}}{{/if}}" class="chat-avatar">
                <div class="msg-content">
                    <strong>{{#if (eq role 'user')}}{{../playerName}}{{else}}{{../npcName}}{{/if}}</strong>
                    <p>{{parts.[0].text}}</p>
                </div>
            </div>
        {{/each}}
        {{#if isThinking}}<div class="msg-wrapper model"><i>Denkt nach...</i></div>{{/if}}
    </div>
    <div style="display:flex; margin-top:10px; gap:5px;">
        <input type="text" id="chat-input" style="flex:1">
        <button id="send-btn" style="width:50px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
