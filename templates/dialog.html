<div class="gemini-chat-container">
    <div id="gemini-history">
        {{#each history}}
            <div class="message {{role}}">
                <strong>{{#if (eq role "user")}}{{../playerName}}{{else}}{{../npcName}}{{/if}}:</strong>
                <p>{{parts.[0].text}}</p>
            </div>
        {{/each}}
        {{#if isThinking}}<div class="thinking">{{npcName}} überlegt...</div>{{/if}}
    </div>
    <div class="input-area" style="display:flex; gap:5px;">
        <input type="text" id="chat-input" placeholder="Sprecht mit dem NSC..." style="flex:1">
        <button id="send-btn" style="width:40px"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
